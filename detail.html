    <style>

        /* 响应式容器 - 手机端全宽，电脑端居中限宽 */
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; }
        @media (min-width: 481px) {
            body { background: #e8e8e8; }
            .app-container { box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        /* 顶部导航 */
        .nav-bar { background: #fff; border-bottom: 1px solid #ebedf0; position: sticky; top: 0; z-index: 100; }
        .nav-inner { display: flex; align-items: center; justify-content: center; height: 46px; position: relative; }
        .nav-back { position: absolute; left: 0; padding: 0 16px; height: 100%; display: flex; align-items: center; cursor: pointer; }
        .nav-back svg { width: 24px; height: 24px; color: #323233; }
        .nav-title { font-size: 18px; font-weight: 500; color: #323233; }
        
        /* 内容区 */
        .content { padding: 16px; background: #fff; min-height: calc(100vh - 46px); }
        
        /* 横幅 */
        .vote-part { margin-bottom: 16px; }
        
        /* 头部卡片 */
        .top-card { border-radius: 7px; padding: 20px; color: #fff; margin-bottom: 24px; box-shadow: 0px 4px 4px 3px rgba(98,191,207,0.2); }

        .top-card.xl { background: linear-gradient(180deg, rgb(55,134,243) 0%, rgb(91,167,248) 100%); }
        .top-card.xw { background: linear-gradient(180deg, rgb(56,80,218) 0%, rgb(86,126,231) 100%); }
        .top-card.ky { background: linear-gradient(180deg, rgb(54,177,197) 0%, rgb(93,200,218) 100%); }
        
        /* 卡片顶部布局 */
        .card-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .photo-group { display: flex; gap: 12px; }
        .photo-box { text-align: center; }
        .img-div { width: 55px; height: 73px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 4px; cursor: pointer; position: relative; }
        .img-div.gray { background: #d1d5db; }
        .img-div:hover { opacity: 0.9; }
        .img-div img { width: 100%; height: 100%; object-fit: cover; }
        .img-div svg { width: 24px; height: 24px; color: rgba(255,255,255,0.6); }
        .img-div .badge { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .img-div .badge span { color: #fff; font-size: 12px; font-weight: bold; }
        .photo-text { font-size: 12px; opacity: 0.9; }
        
        .info-area { flex: 1; }
        .info-area h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; cursor: pointer; user-select: none; }
        .info-area h2:hover { opacity: 0.8; }
        .user-meta { font-size: 14px; cursor: pointer; user-select: none; }
        .user-meta:hover { opacity: 0.8; }
        
        /* 学校信息区 */
        .school-info { margin-top: 8px; }
        .school-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
        .school-name { font-size: 1.3rem; cursor: pointer; user-select: none; }
        .school-name:hover { opacity: 0.8; }
        .degree-tag { background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 12px; font-size: 14px; flex-shrink: 0; }
        .major-row { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .major-row span { cursor: pointer; user-select: none; }
        .major-row span:hover { opacity: 0.8; }
        .divider { height: 1rem; border-left: 1px solid rgba(255,255,255,0.6); }
        
        /* 详情列表 */
        .detail-list { margin-top: 0; }
        .detail-item { display: flex; align-items: center; gap: 16px; padding: 6px 0; font-size: 16px; }
        .detail-label { width: 128px; text-align: right; color: #999998; flex-shrink: 0; }
        .detail-value { flex: 1; color: #343333; cursor: pointer; user-select: none; }
        .detail-value:hover { color: #25b887; }
        
        /* 可编辑区域 */
        .editable { cursor: pointer; user-select: none; }
        .editable.pressing { opacity: 0.6; }
        
        /* 分组标题 */
        .section-title { font-size: 18px; font-weight: 600; color: #333; margin: 24px 0 16px; }
        
        /* 底部说明 */
        .bottom-note { margin-top: 24px; padding: 16px; background: #f5f5f5; border-radius: 8px; font-size: 14px; color: #666; }
        .bottom-note .label { font-weight: 500; }
        
        /* 底部按钮 */
        .bottom-btn { margin-top: 24px; }
        .my-btn { width: 100%; height: 53px; background: rgb(38,184,135); color: #fff; border: none; border-radius: 2px; font-size: 16px; cursor: pointer; }
        .my-btn:hover { background: rgba(38,184,135,0.9); }
        
        /* 编辑弹框 */
        .edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .edit-modal.show { display: flex; }
        .edit-box { background: #fff; border-radius: 12px; width: 100%; max-width: 300px; overflow: hidden; }
        .edit-header { padding: 16px; text-align: center; border-bottom: 1px solid #eee; }
        .edit-header h3 { font-size: 15px; color: #323233; font-weight: 500; }
        .edit-body { padding: 16px; }
        .edit-body input { width: 100%; height: 40px; padding: 0 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .edit-body input:focus { outline: none; border-color: #25b887; }
        .edit-footer { display: flex; border-top: 1px solid #eee; }
        .edit-footer button { flex: 1; height: 44px; border: none; font-size: 14px; cursor: pointer; background: #fff; }
        .edit-footer button:first-child { border-right: 1px solid #eee; color: #666; }
        .edit-footer button:last-child { color: #25b887; font-weight: 500; }
    </style>
</head>

    <script src="js/api-helper.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api';
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'student_status';
        const id = params.get('id');
        let currentItem = null;
        let currentField = null;
        
        // 辅助函数：带签名的 API 请求
        async function apiCall(endpoint, data = {}) {
            return apiRequest(`${API_BASE}${endpoint}`, {
                method: 'POST',
                body: JSON.stringify(data)
            });
        }

        function compressImage(file, maxWidth = 800, maxHeight = 1200, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = (maxHeight / height) * width;
                            height = maxHeight;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }
        
        const TYPE_CONFIG = {
            student_status: { title: '高等学籍', cls: 'xj' },
            education: { title: '高等学历', cls: 'xl' },
            degree: { title: '学位', cls: 'xw' },
            exam: { title: '考研信息', cls: 'ky' }
        };
        
        const FIELD_LABELS = {
            name: '姓名', gender: '性别', birth_date: '出生日期', school: '学校', major: '专业',
            study_type: '学习形式', degree_level: '层次', nationality: '民族', id_number: '证件号码',
            duration: '学制', education_type: '学历类别', department: '分院', branch: '系所',
            class_name: '班级', student_id: '学号', enrollment_date: '入学日期',

            principal_name: '校（院）长姓名', certificate_number: '证书编号', degree_type: '学位类别',
            degree_date: '获学位日期', year: '报考年份', total_score: '初试总分',
            personal_info: '性别/出生日期'
        };
        
        // 默认值
        const DEFAULT_VALUES = {
            student_status: {
                name: '新用户', school: '清华大学', major: '汉语言文学', study_type: '全日制',

                department: '经济管理学院', branch: '经济系', class_name: '20234102',

            },
            education: {

                degree_level: '本科', personal_info: '女    2005年12月17日',
                enrollment_date: '2023年09月01日', graduation_date: '2027年06月30日',
                education_type: '普通高等教育', duration: '4', graduation_status: '毕业',
                principal_name: '李路明', certificate_number: '123456789012345678'
            },
            degree: {

                degree_date: '2027年06月30日', certificate_number: '1000256789012345678'
            },
            exam: {

                exam_location: '1101', exam_number: '110148372', exam_unit: '清华大学',

                politics_score: '78', foreign_score: '80', course1_score: '137', course2_score: '139',

            }
        };
        
        document.getElementById('pageTitle').textContent = TYPE_CONFIG[type]?.title || '详情';
        function goBack() { window.history.back(); }
        
      async function loadDetail() {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!user.id) {
        window.location.href = 'index.html';
        return;
    }
    
    // 直接从服务器获取当前用户的 student_status 记录
    const res = await apiCall('/get-user-data', { userId: user.id }).then(r => r.json());
    // 假设每个用户只有一条学籍记录，取第一条
    currentItem = res.student_status?.[0] || null;
    
    if (!currentItem) {
        // 如果没有记录，可以创建一个空对象，让用户新建
        currentItem = {};
    }
    
    renderDetail();
}
        
       function getVal(field) {
    // 优先从 currentItem 中读取
    if (currentItem && currentItem[field] !== undefined && currentItem[field] !== null) {
        return currentItem[field];
    }
    
    // 如果没有，则从默认值中获取
    const defaults = DEFAULT_VALUES[type];
    if (defaults && defaults[field] !== undefined) {
        return defaults[field];
    }
    return '';
}
    
    // 如果没有，则从默认值中获取
    const defaults = DEFAULT_VALUES[type];
    if (defaults && defaults[field] !== undefined) {
        return defaults[field];
    }
    return '';
}
        
        function renderDetail() {
            const cfg = TYPE_CONFIG[type];
            // 如果是学籍信息，显示编辑页面
            if (type === 'student_status') {
                 renderEditMode();
                 return;
    }
            
            // 横幅
            let html = '<div class="vote-part"><img src="img/zymyd_bg.png" alt="" style="width:100%;display:block;"></div>';
            
            html += '<div class="top-card ' + cfg.cls + '">';
            
            // 照片和用户信息
            html += '<div class="card-row">';
            
            if (type === 'student_status') {
                // 学籍有两个照片框
                const photo1 = getVal('photo');
                const photo2 = getVal('photo2');
                html += '<div class="photo-group">';
                html += '<div class="photo-box"><div class="img-div photo-upload" data-field="photo">';
                if (photo1) {
                    html += '<img src="' + photo1 + '" alt="录取照片">';
                } else {
                    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>';
                }
                html += '</div><span class="photo-text">录取照片</span></div>';
                html += '<div class="photo-box"><div class="img-div gray photo-upload" data-field="photo2">';
                if (photo2) {
                    html += '<img src="' + photo2 + '" alt="学历照片">';
                }
                html += '</div><span class="photo-text">学历照片</span></div>';
                html += '</div>';
            } else {
                // 其他类型只有一个照片框
                const photo = getVal('photo');
                html += '<div class="photo-box"><div class="img-div photo-upload" data-field="photo">';
                if (photo) {
                    html += '<img src="' + photo + '" alt="照片">';
                } else {
                    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>';
                }
                html += '</div></div>';
            }
            
            html += '<div class="info-area">';
            html += '<h2 class="editable" data-field="name">' + getVal('name') + '</h2>';
            // 使用 personal_info 字段显示性别和出生日期
            const pinfo = getVal('personal_info').replace(/\s{2,}/g, m => '&nbsp;'.repeat(m.length));
            html += '<div class="user-meta editable" data-field="personal_info">' + pinfo + '</div>';
            html += '</div></div>';
            
            // 学校信息
            html += '<div class="school-info">';
            if (type === 'exam') {
                // 考研只显示学校名称和年份
                html += '<div class="school-name editable" data-field="school" style="font-size:1.3rem;margin-bottom:12px;">' + getVal('school') + '</div>';
                html += '<div class="editable" data-field="year" style="font-size:14px;">' + getVal('year') + '</div>';
            } else {
                html += '<div class="school-row">';
                html += '<h3 class="school-name editable" data-field="school">' + getVal('school') + '</h3>';
                if (type === 'degree') {
                    html += '<div class="degree-tag">' + getVal('degree_type') + '</div>';
                } else {
                    html += '<div class="degree-tag">' + getVal('degree_level') + '</div>';
                }
                html += '</div>';
                html += '<div class="major-row">';
                html += '<span class="editable" data-field="major">' + getVal('major') + '</span>';
                if (type !== 'degree') {
                    html += '<span class="divider"></span>';
                    html += '<span class="editable" data-field="study_type">' + getVal('study_type') + '</span>';
                }
                html += '</div>';
            }
            html += '</div></div>';
            
            // 详情列表
            html += '<div class="detail-list">' + renderDetailItems() + '</div>';
            
            // 底部按钮或说明
            if (type === 'exam') {
                html += '<div class="bottom-note"><span class="label">说明：</span>系统提供2006年以来入学的硕士研究生报名和成绩数据。</div>';
            } else {
                html += '<div class="bottom-btn"><button class="my-btn">查看验证报告</button></div>';
            }
            
            document.getElementById('content').innerHTML = html;
            bindLongPress();
            bindPhotoUpload();

        function renderEditMode() {
     // 直接使用 currentItem（已从服务器加载），不再从 localStorage 合并

    if (!currentItem) {

    // 设置个人信息的格式化字符串

    html += '</div>';

    // 学校信息
    html += '<div class="school-info">';
    html += '<div class="school-row">';
    html += '<input type="text" class="edit-input-field" id="schoolInput" value="' + getVal('school') + '" placeholder="学校名称" style="font-size:1.3rem;border:none;background:transparent;color:#fff;flex:1;">';
    html += '<input type="text" class="edit-input-field" id="degreeInput" value="' + getVal('degree_level') + '" placeholder="学历层次" style="background:rgba(0,0,0,0.2);backdrop-filter:blur(4px);padding:2px 8px;border-radius:12px;font-size:14px;border:none;color:#fff;flex-shrink:0;width:80px;text-align:center;">';

}function addEditInputStyles() {

        }

            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);

        }

            border-color: rgba(255,255,255,0.8);

        }
        
        .photo-upload {

}

        function renderDetailItems() {

            };

                html += item('证书编号', 'certificate_number');

        function bindLongPress() {
            document.querySelectorAll('.editable').forEach(el => {
                let timer = null;
                const start = (e) => {
                    e.preventDefault();
                    el.classList.add('pressing');
                    timer = setTimeout(() => {
                        el.classList.remove('pressing');
                        openEditModal(el.dataset.field);
                    }, 500);
                };
                const end = () => {
                    el.classList.remove('pressing');
                    if (timer) { clearTimeout(timer); timer = null; }
                };
                el.addEventListener('touchstart', start, { passive: false });
                el.addEventListener('touchend', end);
                el.addEventListener('touchcancel', end);
                el.addEventListener('mousedown', start);
                el.addEventListener('mouseup', end);
                el.addEventListener('mouseleave', end);
            });
        }
        
        // 绑定照片上传
        let currentPhotoField = null;
        let photoHasContent = {}; // 记录每个照片字段是否有内容
        
        function bindPhotoUpload() {
            document.querySelectorAll('.photo-upload').forEach(el => {
                el.style.cursor = 'pointer';
                const field = el.dataset.field;
                
                // 点击上传
                el.onclick = () => {
                    const hasPhoto = currentItem && currentItem[field];
                    if (hasPhoto && !photoHasContent[field + '_changed']) {
                        alert('照片已上传,如需更换请先长按删除');
                        return;
                    }
                    currentPhotoField = el.dataset.field;
                    document.getElementById('photoInput').click();
                };
                
                // 长按删除
                let longPressTimer = null;
                
                el.addEventListener('touchstart', (e) => {
                    const hasPhoto = currentItem && currentItem[field];
                    if (!hasPhoto && !photoHasContent[field + '_changed']) return;
                    longPressTimer = setTimeout(() => {
                        if (confirm('确定要删除照片吗？删除后需要重新上传')) {
                            deletePhoto(field);
                        }
                    }, 800);
                });
                
                el.addEventListener('touchend', () => {
                    clearTimeout(longPressTimer);
                });
                
                el.addEventListener('touchmove', () => {
                    clearTimeout(longPressTimer);
                });
                
                // PC端长按
                el.addEventListener('mousedown', (e) => {
                    const hasPhoto = currentItem && currentItem[field];
                    if (!hasPhoto && !photoHasContent[field + '_changed']) return;
                    longPressTimer = setTimeout(() => {
                        if (confirm('确定要删除照片吗？删除后需要重新上传')) {
                            deletePhoto(field);
                        }
                    }, 800);
                });
                
                el.addEventListener('mouseup', () => {
                    clearTimeout(longPressTimer);
                });
                
                el.addEventListener('mouseleave', () => {
                    clearTimeout(longPressTimer);
                });
            });
        }
        
        // 删除照片
        async function deletePhoto(field) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            try {
                const res = await apiCall('/delete-photo', {
                    userId: user.id,
                    table: type,
                    id: id,
                    field: field
                }).then(r => r.json());
                
                if (res.success) {
                    currentItem[field] = null;
                    photoHasContent[field + '_changed'] = false;
                    alert(res.message + ` (已删除${res.delete_count}/2次，剩余${res.remaining}次)`);
                    renderDetail();
                } else {
                    alert('删除失败: ' + (res.error || '未知错误'));
                }
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }
        
        document.getElementById('photoInput').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file || !currentPhotoField) return;
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                e.target.value = '';
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            // 转为 base64
            try {
                const base64 = await compressImage(file);
                const body = { table: type, action: 'update', data: {}, id: id, userId: user.id };
                body.data[currentPhotoField] = base64;
                const res = await apiCall('/update-data', body).then(r => r.json());
                if (res.success) {
                    currentItem[currentPhotoField] = base64;
                    photoHasContent[currentPhotoField + '_changed'] = false; // 上传成功后锁定
                    renderDetail();

                    const compressHint = document.getElementById('compressHint');
                    const originalSize = (file.size / 1024).toFixed(2);
                    const base64Payload = (base64.split(',')[1] || '');
                    const compressedSize = (base64Payload.length * 3 / 4 / 1024).toFixed(2);
                    const compressRatio = file.size > 0
                        ? ((1 - (compressedSize / originalSize)) * 100).toFixed(0)
                        : '0';
                    compressHint.textContent = `✓ 图片已优化 (${originalSize}KB → ${compressedSize}KB，减少${compressRatio}%)`;
                    compressHint.style.display = 'block';
                    setTimeout(() => {
                        compressHint.style.display = 'none';
                    }, 3000);
                } else {
                    alert('上传失败: ' + (res.error || '未知错误'));
                }
            } catch (err) {
                alert('上传失败: ' + err.message);
                const compressHint = document.getElementById('compressHint');
                compressHint.style.display = 'none';
            }
            e.target.value = ''; // 清空以便重复选择同一文件
        };
        
        function openEditModal(field) {
            currentField = field;
            const label = FIELD_LABELS[field] || field;
            document.getElementById('editTitle').textContent = '编辑' + label;
            let currentVal = currentItem[field] || '';
            if (!currentVal && DEFAULT_VALUES[type] && DEFAULT_VALUES[type][field]) {
                currentVal = DEFAULT_VALUES[type][field];
            }
            document.getElementById('editBody').innerHTML = '<input type="text" id="editInput" value="' + currentVal + '" placeholder="请输入' + label + '">';
            document.getElementById('editModal').classList.add('show');
            setTimeout(() => { document.getElementById('editInput')?.focus(); }, 100);
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentField = null;
        }
        
        async function saveEdit() {
            const input = document.getElementById('editInput');
            if (!input || !currentField) return;
            const newVal = input.value;
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            try {
                const body = { table: type, action: 'update', data: {}, id: id, userId: user.id };
                body.data[currentField] = newVal;
                const res = await apiCall('/update-data', body).then(r => r.json());
                if (res.success) {
                    currentItem[currentField] = newVal;
                    renderDetail();
                    closeEditModal();
                } else {
                    alert('保存失败: ' + (res.error || '未知错误'));
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }
       async function saveStudentData() {
    // 收集所有输入框的数据
    const data = {
        name: document.getElementById('nameInput').value,
        gender: document.getElementById('genderInput').value,
        birthday: document.getElementById('birthdayInput').value,
        school: document.getElementById('schoolInput').value,
        degree_level: document.getElementById('degreeInput').value,
        major: document.getElementById('majorInput').value,
        study_type: document.getElementById('studyTypeInput').value,
        nationality: document.getElementById('nationalityInput').value,
        id_number: document.getElementById('idNumberInput').value,
        duration: document.getElementById('durationInput').value,
        education_type: document.getElementById('educationTypeInput').value,
        department: document.getElementById('departmentInput').value,
        branch: document.getElementById('branchInput').value,
        class_name: document.getElementById('classInput').value,
        student_id: document.getElementById('studentIdInput').value,
        enrollment_date: document.getElementById('enrollmentDateInput').value,
        status: document.getElementById('statusInput').value,
        graduation_date: document.getElementById('graduationDateInput').value,
        admissionPhoto: document.getElementById('admissionPhoto').src,
        educationPhoto: document.getElementById('educationPhoto').src
    };
    
    if (!data.name || !data.id_number) {
        alert('姓名和证件号码是必填项！');
        return;
    }
    
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!user.id) {
        alert('请先登录');
        window.location.href = 'index.html';
        return;
    }
    
    try {
        // 确定是新增还是更新
        let action = 'insert';
        let recordId = null;
        if (currentItem && currentItem.id) {
            action = 'update';
            recordId = currentItem.id;
        }
        
        const payload = {
            table: 'student_status',
            action: action,
            data: data,
            userId: user.id
        };
        if (recordId) payload.id = recordId;
        
        const res = await apiCall('/update-data', payload);
        const result = await res.json();
        
        if (result.success) {
            alert('信息保存成功！');
            // 更新 currentItem 以便后续操作
            if (action === 'insert' && result.id) {
                data.id = result.id;
            }
            currentItem = { ...currentItem, ...data };
        } else {
            alert('保存失败：' + (result.error || '未知错误'));
        }
    } catch (error) {
        alert('保存失败：' + error.message);
    }
}
