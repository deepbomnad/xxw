        body{margin:0;padding:0;max-width:750px;margin:0 auto;line-height:1.5;font:14px/1.5 PingFang SC,Microsoft YaHei,Helvetica Neue,Arial,sans-serif;background:#fff}
        a,a:link,a:visited{color:#26b887;text-decoration:none}
        .van-col{float:left;box-sizing:border-box}
        .van-col--8{width:33.33333333%}
        .van-row:after{content:"";display:table;clear:both}

        .van-tabbar-item__icon{margin-bottom:.08rem}
        .van-tabbar-item--active{color:#26b887}

        .my-header a.go-out{position:absolute;top:.24rem;right:.373rem;color:#26b887;font-size:.4rem}
        
        .vote-part{padding:0 .38rem}

        .menu-part .menu-img{display:inline-block;margin-bottom:.133rem;width:.8rem;height:.8rem;background-size:100%}

        .menu-part .rzbg-img{background-image:url(img/image_4.png)}
